name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (web)
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Type-check (invitation)
        run: npx tsc --noEmit
        working-directory: apps/invitation

      - name: Type-check (server)
        run: npx tsc --noEmit
        working-directory: server

      - name: Test (server)
        run: npm test -- --runInBand --forceExit
        working-directory: server

      - name: Build (web)
        run: npm run build:web

      - name: Build (invitation)
        run: npm run build:invitation

      - name: Build (server)
        run: npm run build:server
